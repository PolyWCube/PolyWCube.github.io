name: Secrets

on:
    workflow_dispatch

jobs:
    secrets:
        runs-on: ubuntu-latest
        env:
            GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        steps:
          - name: Display API Key
            run: |
                echo $GEMINI_API_KEY_1
                cd src/base/scr
                node intergrative-ai.js
            